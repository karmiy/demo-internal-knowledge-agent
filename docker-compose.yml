services:
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    command: ["sh", "-c", "alembic upgrade head && python -m app.seed && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://knowledge:knowledge@postgres:5432/knowledge
      DOCUMENT_ROOT: /data/documents
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - document-data:/data/documents
      - ./documents:/seed-documents:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  ingest:
    build: ./backend
    command: ["python", "-m", "app.ingestion"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://knowledge:knowledge@postgres:5432/knowledge
      DOCUMENT_ROOT: /data/documents
    volumes:
      - document-data:/data/documents
      - ./documents:/seed-documents:ro
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  document-data:
